<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Slots Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6vEmfgTR1q0zpYh0b9hDL0B2t81b-1vM",
            authDomain: "clutchdq.firebaseapp.com",
            databaseURL: "https://clutchdq-default-rtdb.firebaseio.com",
            projectId: "clutchdq",
            storageBucket: "clutchdq.firebasestorage.app",
            messagingSenderId: "329422689964",
            appId: "1:329422689964:web:7b8b810734df75a84bb109",
            measurementId: "G-7PBE17HMH3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "luxury-casino-v1";

        // Состояние приложения
        let currentUser = null;
        let balance = 0;
        const symbols = ['💎', '🍒', '🍋', '🔔', '7️⃣', '🌟'];
        const ITEM_HEIGHT = 100;

        // UI элементы
        const balanceText = document.getElementById('balanceText');
        const spinBtn = document.getElementById('spinBtn');
        const winPopup = document.getElementById('winPopup');
        const codeList = document.getElementById('codeList');

        // Инициализация барабанов
        const reelEls = [
            setupReel('reel0'),
            setupReel('reel1'),
            setupReel('reel2')
        ];

        function setupReel(id) {
            const reel = document.getElementById(id);
            const content = [];
            for (let i = 0; i < 40; i++) {
                content.push(`<div class="slot-item">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`);
            }
            reel.innerHTML = content.join('');
            return reel;
        }

        // Авторизация
        signInAnonymously(auth).catch(console.error);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Загрузка или создание профиля игрока (приватные данные)
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                const userDoc = await getDoc(userDocRef);

                if (!userDoc.exists()) {
                    await setDoc(userDocRef, { balance: 0 });
                }

                // Подписка на обновления баланса
                onSnapshot(userDocRef, (doc) => {
                    if (doc.exists()) {
                        balance = doc.data().balance;
                        updateBalanceUI();
                    }
                });

                // Подписка на публичные промокоды
                const promoRef = collection(db, 'artifacts', appId, 'public', 'data', 'promocodes');
                onSnapshot(promoRef, (snapshot) => {
                    const codes = [];
                    snapshot.forEach(doc => codes.push(doc.id));
                    codeList.textContent = codes.length ? codes.join(', ') : 'нет';
                });
            }
        });

        function updateBalanceUI() {
            balanceText.textContent = balance;
            spinBtn.disabled = balance <= 0;
        }

        // ИГРОВАЯ ЛОГИКА
        window.handleSpin = async () => {
            if (!currentUser || balance <= 0) return;

            // Списываем попытку в Firebase
            const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
            await updateDoc(userDocRef, { balance: balance - 1 });

            spinBtn.disabled = true;
            winPopup.classList.remove('active');

            const animationPromises = reelEls.map((reel, index) => animateReel(reel, index));
            const finalSymbols = await Promise.all(animationPromises);

            if (finalSymbols[0] === finalSymbols[1] && finalSymbols[1] === finalSymbols[2]) {
                showWin();
            } else {
                spinBtn.disabled = balance <= 0;
            }
        };

        function animateReel(reel, index) {
            return new Promise(resolve => {
                const targetSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                const items = reel.querySelectorAll('.slot-item');
                items[items.length - 1].textContent = targetSymbol;

                const duration = 2000 + (index * 600);
                const distance = (items.length - 1) * ITEM_HEIGHT;

                reel.style.transition = `transform ${duration}ms cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
                reel.style.transform = `translateY(-${distance}px)`;

                setTimeout(() => {
                    reel.style.transition = 'none';
                    reel.style.transform = 'translateY(0)';
                    items.forEach(item => item.textContent = targetSymbol);
                    resolve(targetSymbol);
                }, duration);
            });
        }

        function showWin() {
            winPopup.classList.add('active');
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#b8860b', '#ffffff']
            });
            setTimeout(() => {
                winPopup.classList.remove('active');
                spinBtn.disabled = balance <= 0;
            }, 3000);
        }

        // ПРОМОКОДЫ
        window.activatePromo = async () => {
            const input = document.getElementById('promoInput');
            const codeName = input.value.trim().toUpperCase();
            if (!codeName || !currentUser) return;

            const promoDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', codeName);
            const promoDoc = await getDoc(promoDocRef);

            if (promoDoc.exists()) {
                const reward = promoDoc.data().value;
                const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
                
                // Начисляем баланс и удаляем код
                await updateDoc(userDocRef, { balance: balance + reward });
                await deleteDoc(promoDocRef);
                
                input.value = '';
                alert('Успех! Попытки добавлены.');
            } else {
                alert('Код не найден или уже использован.');
            }
        };

        // АДМИНКА
        window.savePromo = async () => {
            const name = document.getElementById('newPromoName').value.trim().toUpperCase();
            const val = parseInt(document.getElementById('newPromoVal').value);
            if (name && val >= 0) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', name), { value: val });
                document.getElementById('newPromoName').value = '';
                document.getElementById('newPromoVal').value = '';
                alert('Промокод создан в базе!');
            }
        };

        // Навигация UI
        window.openAuth = () => { document.getElementById('authModal').style.display = 'flex'; };
        window.closeModals = () => { 
            document.getElementById('authModal').style.display = 'none'; 
            document.getElementById('adminModal').style.display = 'none'; 
        };
        window.checkPass = () => {
            if (document.getElementById('adminPass').value === '0501') {
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('adminModal').style.display = 'flex';
                document.getElementById('adminPass').value = '';
            } else { alert('Неверно'); }
        };

    </script>

    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #b8860b;
            --text: #ffffff;
            --border: #2a2a2a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; }

        .casino-card {
            background: var(--card);
            border-radius: 32px;
            padding: 40px 30px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
        }

        h1 { font-weight: 800; font-size: 1.4rem; margin: 0 0 25px 0; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }

        .balance-badge {
            background: #111;
            padding: 12px 25px;
            border-radius: 100px;
            border: 1px solid var(--border);
            display: inline-block;
            margin-bottom: 30px;
        }

        .balance-label { font-size: 0.65rem; opacity: 0.4; display: block; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
        .balance-value { font-weight: 800; font-size: 1.5rem; color: #fff; }

        .slot-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            padding: 15px;
            background: #000;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .slot-window { width: 80px; height: 100px; background: #050505; border-radius: 12px; position: relative; overflow: hidden; }

        .slot-reel { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; }

        .slot-item { height: 100px; width: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; flex-shrink: 0; }

        .btn-main {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, #b8860b, #8b6508);
            color: #000; font-weight: 800; font-size: 1.1rem; cursor: pointer;
            transition: all 0.3s; margin-bottom: 20px; text-transform: uppercase;
        }

        .btn-main:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 10px 25px rgba(139, 101, 8, 0.4); }

        .btn-main:disabled { background: #222; color: #444; cursor: not-allowed; }

        .promo-group { display: flex; gap: 10px; }

        .input-base {
            flex: 1; background: #1a1a1a; border: 1px solid var(--border);
            padding: 15px; border-radius: 15px; color: white; outline: none;
        }

        .btn-side { background: #252525; border: none; color: white; padding: 0 25px; border-radius: 15px; cursor: pointer; font-weight: 600; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center;
            justify-content: center; z-index: 1000; backdrop-filter: blur(8px);
        }

        .modal-box { background: #111; width: 90%; max-width: 340px; padding: 35px; border-radius: 28px; border: 1px solid var(--border); text-align: center; }

        .admin-link { margin-top: 35px; font-size: 0.7rem; opacity: 0.2; cursor: pointer; letter-spacing: 2px; }

        .win-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            z-index: 100; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 24px;
            border: 2px solid var(--accent); pointer-events: none; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .win-overlay.active { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div class="container">
        <div class="casino-card">
            <div class="win-overlay" id="winPopup">
                <h2 style="color: var(--accent); margin: 0; font-size: 2.2rem; font-weight: 900;">ВЫИГРЫШ!</h2>
                <p style="margin: 10px 0 0 0; opacity: 0.6; font-weight: 600;">+0 ПОПЫТОК</p>
            </div>

            <h1>LUXURY SLOTS</h1>
            
            <div class="balance-badge">
                <span class="balance-label">ДОСТУПНЫЕ ПОПЫТКИ</span>
                <span class="balance-value" id="balanceText">0</span>
            </div>

            <div class="slot-container">
                <div class="slot-window"><div class="slot-reel" id="reel0"></div></div>
                <div class="slot-window"><div class="slot-reel" id="reel1"></div></div>
                <div class="slot-window"><div class="slot-reel" id="reel2"></div></div>
            </div>

            <button class="btn-main" id="spinBtn" onclick="handleSpin()">ЗАПУСТИТЬ</button>

            <div class="promo-group">
                <input type="text" id="promoInput" class="input-base" placeholder="Промокод">
                <button class="btn-side" onclick="activatePromo()">ОК</button>
            </div>

            <div class="admin-link" onclick="openAuth()">АДМИНИСТРАТОР</div>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-box">
            <h3>ВХОД В ПАНЕЛЬ</h3>
            <input type="password" id="adminPass" class="input-base" style="width:100%; text-align:center; letter-spacing: 8px; margin: 20px 0;" placeholder="****">
            <button class="btn-main" onclick="checkPass()">ПОДТВЕРДИТЬ</button>
            <button class="btn-side" style="width:100%; padding:12px;" onclick="closeModals()">ОТМЕНА</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-box">
            <h3 style="color: var(--accent);">УПРАВЛЕНИЕ</h3>
            <input type="text" id="newPromoName" class="input-base" style="width:100%; margin-bottom:12px;" placeholder="Имя кода">
            <input type="number" id="newPromoVal" class="input-base" style="width:100%; margin-bottom:20px;" placeholder="Количество попыток">
            <button class="btn-main" onclick="savePromo()">СОЗДАТЬ</button>
            <button class="btn-side" style="width:100%; padding:12px;" onclick="closeModals()">ЗАКРЫТЬ</button>
            <div style="margin-top: 25px; font-size: 0.75rem; text-align: left; border-top: 1px solid #222; padding-top: 15px;">
                <span style="opacity: 0.4;">Активные коды в базе:</span>
                <div id="codeList" style="margin-top: 5px; color: var(--accent); font-weight: 600;">загрузка...</div>
            </div>
        </div>
    </div>

</body>
</html>
