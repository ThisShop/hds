<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Slots: Limited Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6vEmfgTR1q0zpYh0b9hDL0B2t81b-1vM",
            authDomain: "clutchdq.firebaseapp.com",
            databaseURL: "https://clutchdq-default-rtdb.firebaseio.com",
            projectId: "clutchdq",
            storageBucket: "clutchdq.firebasestorage.app",
            messagingSenderId: "329422689964",
            appId: "1:329422689964:web:7b8b810734df75a84bb109",
            measurementId: "G-7PBE17HMH3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "luxury-casino-v1";

        let currentUser = null;
        let balance = 0;
        let usedPromos = [];
        const symbols = ['💎', '🍒', '🍋', '🔔', '7️⃣', '🌟'];
        const ITEM_HEIGHT = 100;

        // UI Refs
        const balanceText = document.getElementById('balanceText');
        const spinBtn = document.getElementById('spinBtn');
        const winChoiceModal = document.getElementById('winChoiceModal');

        const reelEls = [setupReel('reel0'), setupReel('reel1'), setupReel('reel2')];

        function setupReel(id) {
            const reel = document.getElementById(id);
            const content = Array.from({length: 40}, () => `<div class="slot-item">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`);
            reel.innerHTML = content.join('');
            return reel;
        }

        signInAnonymously(auth).catch(console.error);
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                const userDoc = await getDoc(userDocRef);
                
                if (!userDoc.exists()) {
                    await setDoc(userDocRef, { balance: 0, usedPromos: [] });
                }

                onSnapshot(userDocRef, (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        balance = data.balance || 0;
                        usedPromos = data.usedPromos || [];
                        balanceText.textContent = balance;
                        if (winChoiceModal.style.display !== 'flex') spinBtn.disabled = balance <= 0;
                    }
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'promocodes'), (snap) => {
                    const codes = [];
                    snap.forEach(d => {
                        const data = d.data();
                        if (data.uses < data.maxUses) codes.push(d.id);
                    });
                    document.getElementById('codeList').textContent = codes.length ? codes.join(', ') : 'нет';
                });
            }
        });

        // Spin Logic
        window.handleSpin = async () => {
            if (!currentUser || balance <= 0) return;
            const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
            await updateDoc(userDocRef, { balance: balance - 1 });
            spinBtn.disabled = true;
            const finalSymbols = await Promise.all(reelEls.map((reel, i) => animateReel(reel, i)));
            checkWin(finalSymbols);
        };

        function animateReel(reel, index) {
            return new Promise(resolve => {
                const targetSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                const items = reel.querySelectorAll('.slot-item');
                items[items.length - 1].textContent = targetSymbol;
                const duration = 2000 + (index * 600);
                reel.style.transition = `transform ${duration}ms cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
                reel.style.transform = `translateY(-${(items.length - 1) * ITEM_HEIGHT}px)`;
                setTimeout(() => {
                    reel.style.transition = 'none';
                    reel.style.transform = 'translateY(0)';
                    items.forEach(item => item.textContent = targetSymbol);
                    resolve(targetSymbol);
                }, duration);
            });
        }

        function checkWin(res) {
            const counts = {};
            res.forEach(s => counts[s] = (counts[s] || 0) + 1);
            const max = Math.max(...Object.values(counts));
            if (max >= 2) showChoiceModal(max);
            else spinBtn.disabled = balance <= 0;
        }

        function showChoiceModal(type) {
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.7 }, colors: ['#b8860b', '#fff'] });
            winChoiceModal.style.display = 'flex';
            const isJackpot = type === 3;
            document.getElementById('choiceTitle').textContent = isJackpot ? "ДЖЕКПОТ (3/3)" : "ВЫИГРЫШ (2/3)";
            document.getElementById('choiceDesc').textContent = "Выберите ваш приз:";
            document.getElementById('btnOpt1').textContent = isJackpot ? "+2 ПРОКРУТА" : "+1 ПРОКРУТ";
            document.getElementById('btnOpt2').textContent = isJackpot ? "X2 ВЕЩЬ" : "ВЕРНУТЬ ВЕЩЬ";
            window.currentWinType = type;
        }

        window.makeChoice = async (option) => {
            const type = window.currentWinType;
            winChoiceModal.style.display = 'none';
            if (option === 1) {
                const add = type === 3 ? 2 : 1;
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data'), { balance: balance + add });
                alert(`Добавлено ${add} попыток!`);
            } else {
                alert(type === 3 ? "Заявка на X2 отправлена!" : "Запрос на возврат принят!");
            }
            spinBtn.disabled = balance <= 0;
        };

        // Promo Logic
        window.activatePromo = async () => {
            const input = document.getElementById('promoInput');
            const code = input.value.trim().toUpperCase();
            if (!code || !currentUser) return;

            if (usedPromos.includes(code)) {
                alert('Вы уже активировали этот код!');
                return;
            }

            const promoRef = doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', code);
            const promoSnap = await getDoc(promoRef);

            if (promoSnap.exists()) {
                const data = promoSnap.data();
                if (data.uses >= data.maxUses) {
                    alert('Лимит активаций этого кода исчерпан!');
                    return;
                }

                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
                await updateDoc(userRef, { 
                    balance: balance + data.value,
                    usedPromos: arrayUnion(code)
                });
                await updateDoc(promoRef, { uses: increment(1) });
                
                input.value = '';
                alert(`Код активирован! +${data.value} попыток.`);
            } else alert('Код не существует');
        };

        window.savePromo = async () => {
            const name = document.getElementById('newPromoName').value.trim().toUpperCase();
            const val = parseInt(document.getElementById('newPromoVal').value);
            const max = parseInt(document.getElementById('newPromoMax').value);
            if (name && val >= 0 && max > 0) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'promocodes', name), { 
                    value: val, 
                    maxUses: max,
                    uses: 0 
                });
                alert('Промокод создан');
                document.querySelectorAll('#adminModal input').forEach(i => i.value = '');
            } else alert('Заполните все поля корректно');
        };

        window.openAuth = () => { document.getElementById('authModal').style.display = 'flex'; };
        window.closeModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); };
        window.checkPass = () => {
            if (document.getElementById('adminPass').value === '0501') {
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('adminModal').style.display = 'flex';
            } else alert('Неверно');
        };
    </script>

    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #b8860b; --text: #fff; --border: #222; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .casino-card { background: var(--card); border-radius: 32px; padding: 35px; border: 1px solid var(--border); box-shadow: 0 40px 80px rgba(0,0,0,0.9); text-align: center; position: relative; }
        h1 { font-weight: 800; font-size: 1.3rem; letter-spacing: 4px; color: var(--accent); margin-bottom: 25px; }
        .balance-badge { background: #000; padding: 12px 30px; border-radius: 100px; border: 1px solid var(--border); margin-bottom: 30px; display: inline-block; }
        .balance-label { font-size: 0.6rem; opacity: 0.4; letter-spacing: 2px; display: block; margin-bottom: 3px; }
        .balance-value { font-weight: 800; font-size: 1.6rem; }
        .slot-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; background: #000; padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .slot-window { width: 85px; height: 100px; background: #050505; border-radius: 12px; position: relative; overflow: hidden; }
        .slot-reel { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; }
        .slot-item { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .btn-main { width: 100%; padding: 18px; border-radius: 18px; border: none; background: linear-gradient(135deg, #b8860b, #8b6508); color: #000; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-bottom: 15px; }
        .btn-main:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(139, 101, 8, 0.4); }
        .btn-main:disabled { background: #222; color: #444; cursor: not-allowed; }
        .promo-group { display: flex; gap: 8px; }
        .input-base { flex: 1; background: #1a1a1a; border: 1px solid var(--border); padding: 14px; border-radius: 14px; color: #fff; outline: none; }
        .btn-side { background: #252525; border: none; color: #fff; padding: 0 20px; border-radius: 14px; cursor: pointer; font-weight: 600; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); padding: 20px; }
        .modal-box { background: #111; width: 100%; max-width: 320px; padding: 30px; border-radius: 28px; border: 1px solid var(--border); text-align: center; }
        .admin-link { margin-top: 30px; font-size: 0.65rem; opacity: 0.2; cursor: pointer; letter-spacing: 2px; }
        .choice-btn { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-weight: 700; cursor: pointer; transition: 0.2s; }
        .choice-btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div class="container">
        <div class="casino-card">
            <h1>LUXURY SLOTS</h1>
            <div class="balance-badge">
                <span class="balance-label">БАЛАНС ПОПЫТОК</span>
                <span class="balance-value" id="balanceText">0</span>
            </div>

            <div class="slot-container">
                <div class="slot-window"><div class="slot-reel" id="reel0"></div></div>
                <div class="slot-window"><div class="slot-reel" id="reel1"></div></div>
                <div class="slot-window"><div class="slot-reel" id="reel2"></div></div>
            </div>

            <button class="btn-main" id="spinBtn" onclick="handleSpin()">ИГРАТЬ</button>

            <div class="promo-group">
                <input type="text" id="promoInput" class="input-base" placeholder="Промокод">
                <button class="btn-side" onclick="activatePromo()">ОК</button>
            </div>
            <div class="admin-link" onclick="openAuth()">ADMIN PANEL</div>
        </div>
    </div>

    <!-- Choice Modal -->
    <div id="winChoiceModal" class="modal">
        <div class="modal-box">
            <h2 id="choiceTitle" style="color: var(--accent); margin: 0 0 10px 0;">ВЫИГРЫШ!</h2>
            <p id="choiceDesc" style="opacity: 0.7; margin-bottom: 25px;">Выберите ваш приз:</p>
            <button class="choice-btn" id="btnOpt1" onclick="makeChoice(1)"></button>
            <button class="choice-btn" id="btnOpt2" onclick="makeChoice(2)"></button>
        </div>
    </div>

    <!-- Auth -->
    <div id="authModal" class="modal">
        <div class="modal-box">
            <h3>ВХОД</h3>
            <input type="password" id="adminPass" class="input-base" style="width:100%; text-align:center; letter-spacing: 10px; margin: 20px 0;" placeholder="****">
            <button class="btn-main" onclick="checkPass()">ВОЙТИ</button>
            <button class="btn-side" style="width:100%; padding:12px;" onclick="closeModals()">ОТМЕНА</button>
        </div>
    </div>

    <!-- Admin -->
    <div id="adminModal" class="modal">
        <div class="modal-box">
            <h3 style="color: var(--accent);">АДМИНКА</h3>
            <input type="text" id="newPromoName" class="input-base" style="width:100%; margin-bottom:10px;" placeholder="Имя кода">
            <input type="number" id="newPromoVal" class="input-base" style="width:100%; margin-bottom:10px;" placeholder="Попытки (+)">
            <input type="number" id="newPromoMax" class="input-base" style="width:100%; margin-bottom:15px;" placeholder="Макс. активаций">
            <button class="btn-main" onclick="savePromo()">СОЗДАТЬ</button>
            <button class="btn-side" style="width:100%; padding:12px;" onclick="closeModals()">ЗАКРЫТЬ</button>
            <div style="margin-top: 20px; font-size: 0.7rem; text-align: left; opacity: 0.5;">
                Доступно: <span id="codeList">...</span>
            </div>
        </div>
    </div>

</body>
</html>
