<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Slots</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #b8860b;
            --text: #ffffff;
            --border: #2a2a2a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .casino-card {
            background: var(--card);
            border-radius: 32px;
            padding: 40px 30px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
        }

        h1 {
            font-weight: 800;
            font-size: 1.4rem;
            margin: 0 0 25px 0;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .balance-badge {
            background: #111;
            padding: 12px 25px;
            border-radius: 100px;
            border: 1px solid var(--border);
            display: inline-block;
            margin-bottom: 30px;
        }

        .balance-label { font-size: 0.65rem; opacity: 0.4; display: block; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
        .balance-value { font-weight: 800; font-size: 1.5rem; color: #fff; }

        /* Игровое поле с анимацией ленты */
        .slot-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            padding: 15px;
            background: #000;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        .slot-window {
            width: 80px;
            height: 100px;
            background: #050505;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .slot-reel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .slot-item {
            height: 100px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            flex-shrink: 0;
        }

        /* Кнопки */
        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #b8860b, #8b6508);
            color: #000;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-main:hover:not(:disabled) {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 10px 25px rgba(139, 101, 8, 0.4);
        }

        .btn-main:disabled {
            background: #222;
            color: #444;
            cursor: not-allowed;
        }

        .promo-group {
            display: flex;
            gap: 10px;
        }

        .input-base {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 15px;
            color: white;
            outline: none;
            font-family: inherit;
            transition: border 0.3s;
        }

        .input-base:focus { border-color: var(--accent); }

        .btn-side {
            background: #252525;
            border: none;
            color: white;
            padding: 0 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-side:hover { background: #333; }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-box {
            background: #111;
            width: 90%;
            max-width: 340px;
            padding: 35px;
            border-radius: 28px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .admin-link {
            margin-top: 35px;
            font-size: 0.7rem;
            opacity: 0.2;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .admin-link:hover { opacity: 0.8; }

        /* Табло выигрыша */
        .win-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 100;
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 24px;
            border: 2px solid var(--accent);
            pointer-events: none;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .win-overlay.active { transform: translate(-50%, -50%) scale(1); }

    </style>
</head>
<body>

    <div class="container">
        <div class="casino-card">
            <div class="win-overlay" id="winPopup">
                <h2 style="color: var(--accent); margin: 0; font-size: 2.2rem; font-weight: 900;">ВЫИГРЫШ!</h2>
                <p style="margin: 10px 0 0 0; opacity: 0.6; font-weight: 600;">+0 ПОПЫТОК</p>
            </div>

            <h1>DAMIR BET</h1>
            
            <div class="balance-badge">
                <span class="balance-label">ДОСТУПНЫЕ ПОПЫТКИ</span>
                <span class="balance-value" id="balanceText">0</span>
            </div>

            <div class="slot-container">
                <div class="slot-window"><div class="slot-reel" id="reel0"></div></div>
                <div class="slot-window"><div class="slot-reel" id="reel1"></div></div>
                <div class="slot-window"><div class="slot-reel" id="reel2"></div></div>
            </div>

            <button class="btn-main" id="spinBtn" onclick="handleSpin()">ЗАПУСТИТЬ</button>

            <div class="promo-group">
                <input type="text" id="promoInput" class="input-base" placeholder="Промокод">
                <button class="btn-side" onclick="activatePromo()">ОК</button>
            </div>

            <div class="admin-link" onclick="openAuth()">АДМИНИСТРАТОР</div>
        </div>
    </div>

    <!-- Авторизация -->
    <div id="authModal" class="modal">
        <div class="modal-box">
            <h3 style="margin-top: 0; letter-spacing: 1px;">ВХОД В ПАНЕЛЬ</h3>
            <input type="password" id="adminPass" class="input-base" style="width:100%; text-align:center; letter-spacing: 8px; margin: 20px 0;" placeholder="****">
            <button class="btn-main" onclick="checkPass()">ПОДТВЕРДИТЬ</button>
            <button class="btn-side" style="width:100%; padding:12px;" onclick="closeModals()">ОТМЕНА</button>
        </div>
    </div>

    <!-- Админка -->
    <div id="adminModal" class="modal">
        <div class="modal-box">
            <h3 style="margin-top: 0; color: var(--accent);">УПРАВЛЕНИЕ</h3>
            <input type="text" id="newPromoName" class="input-base" style="width:100%; margin-bottom:12px;" placeholder="Имя кода">
            <input type="number" id="newPromoVal" class="input-base" style="width:100%; margin-bottom:20px;" placeholder="Количество попыток">
            <button class="btn-main" onclick="savePromo()">СОЗДАТЬ</button>
            <button class="btn-side" style="width:100%; padding:12px;" onclick="closeModals()">ЗАКРЫТЬ</button>
            <div style="margin-top: 25px; font-size: 0.75rem; text-align: left; border-top: 1px solid #222; padding-top: 15px;">
                <span style="opacity: 0.4;">Активные коды:</span>
                <div id="codeList" style="margin-top: 5px; color: var(--accent); font-weight: 600;">нет</div>
            </div>
        </div>
    </div>

    <script>
        let balance = 0;
        const symbols = ['💎', '🍒', '🍋', '🔔', '7️⃣', '🌟'];
        const promos = {};
        const ITEM_HEIGHT = 100;

        // Генерация длинной ленты для каждого барабана
        function createReel(id) {
            const reel = document.getElementById(id);
            const content = [];
            // Создаем массив из 40 символов для длинной прокрутки
            for (let i = 0; i < 40; i++) {
                content.push(`<div class="slot-item">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`);
            }
            reel.innerHTML = content.join('');
            return reel;
        }

        let reelEls = [];
        window.onload = () => {
            reelEls = [createReel('reel0'), createReel('reel1'), createReel('reel2')];
            updateBalanceUI();
        };

        function updateBalanceUI() {
            document.getElementById('balanceText').textContent = balance;
            document.getElementById('spinBtn').disabled = balance <= 0;
        }

        async function handleSpin() {
            if (balance <= 0) return;

            balance--;
            updateBalanceUI();
            
            const spinBtn = document.getElementById('spinBtn');
            const winPopup = document.getElementById('winPopup');
            spinBtn.disabled = true;
            winPopup.classList.remove('active');

            const results = [];
            const animationPromises = reelEls.map((reel, index) => animateReel(reel, index));

            const finalSymbols = await Promise.all(animationPromises);
            
            // Проверка выигрыша
            if (finalSymbols[0] === finalSymbols[1] && finalSymbols[1] === finalSymbols[2]) {
                showWin();
            } else {
                spinBtn.disabled = balance <= 0;
            }
        }

        function animateReel(reel, index) {
            return new Promise(resolve => {
                const targetSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                // Подменяем последний элемент в ленте на нужный результат
                const items = reel.querySelectorAll('.slot-item');
                const lastItemIndex = items.length - 1;
                items[lastItemIndex].textContent = targetSymbol;

                const duration = 2000 + (index * 600); // Разное время для каждого барабана
                const distance = (items.length - 1) * ITEM_HEIGHT;

                reel.style.transition = `transform ${duration}ms cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
                reel.style.transform = `translateY(-${distance}px)`;

                setTimeout(() => {
                    // После анимации сбрасываем положение без анимации для следующего раза
                    reel.style.transition = 'none';
                    reel.style.transform = 'translateY(0)';
                    // Все элементы делаем как выпавший символ для статичного вида
                    items.forEach(item => item.textContent = targetSymbol);
                    resolve(targetSymbol);
                }, duration);
            });
        }

        function showWin() {
            const popup = document.getElementById('winPopup');
            popup.classList.add('active');
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#b8860b', '#ffffff']
            });

            setTimeout(() => {
                popup.classList.remove('active');
                document.getElementById('spinBtn').disabled = balance <= 0;
            }, 3000);
        }

        // Логика промокодов
        function activatePromo() {
            const input = document.getElementById('promoInput');
            const code = input.value.trim().toUpperCase();
            if (promos[code]) {
                balance += promos[code];
                delete promos[code];
                updateBalanceUI();
                renderCodes();
                input.value = '';
                alert('Попытки начислены!');
            } else {
                alert('Неверный код');
            }
        }

        // Админка
        function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
        function closeModals() { 
            document.getElementById('authModal').style.display = 'none'; 
            document.getElementById('adminModal').style.display = 'none'; 
        }

        function checkPass() {
            if (document.getElementById('adminPass').value === '0501') {
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('adminModal').style.display = 'flex';
                document.getElementById('adminPass').value = '';
            } else {
                alert('Ошибка доступа');
            }
        }

        function savePromo() {
            const name = document.getElementById('newPromoName').value.trim().toUpperCase();
            const val = parseInt(document.getElementById('newPromoVal').value);
            if (name && val >= 0) {
                promos[name] = val;
                document.getElementById('newPromoName').value = '';
                document.getElementById('newPromoVal').value = '';
                renderCodes();
                alert('Промокод создан');
            }
        }

        function renderCodes() {
            const keys = Object.keys(promos);
            document.getElementById('codeList').textContent = keys.length ? keys.join(', ') : 'нет';
        }
    </script>
</body>
</html>
